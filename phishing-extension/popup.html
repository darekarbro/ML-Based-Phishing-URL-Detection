<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Phishing Detector</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="icon-container">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="shield-icon">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
        </div>
        <h2>Phishing Detector</h2>
    </div>

    <p class="subtitle">
        Analyze the current website for phishing risk
    </p>

    <div class="action-buttons">
        <button id="fastScanBtn" class="apple-btn primary-btn">
            Fast Scan
            <div class="tooltip-container">
                <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                <div class="tooltip-text">Quick ML-based scan for instant risk assessment.</div>
            </div>
        </button>
        <button id="detailedScanBtn" class="apple-btn secondary-btn">
            Detailed Scan
            <div class="tooltip-container">
                <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                <div class="tooltip-text">Deep analysis showing all extracted features and their values.</div>
            </div>
        </button>
    </div>

    <div id="resultBox" class="result-card hidden">
        <!-- Content will be injected here -->
    </div>
</div>

<script src="popup.js"></script>

</body>
</html>
